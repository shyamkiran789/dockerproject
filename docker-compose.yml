version: '3.8'

services:

  internetbanking:
    image: kiran0099/internetbank-image
    ports:
      - "81:80"
    deploy:
      replicas: 3
    volumes:
      - /var/lib/internetbanking

  mobilebanking:
    image: kiran0099/mob-image
    ports:
      - "82:80"
    deploy:
      replicas: 3
    volumes:
      - /var/lib/mobilebanking

  insurance:
    image: kiran0099/insurance-image
    ports:
      - "83:80"
    deploy:
      replicas: 3
    volumes:
      - /var/lib/insurance

  loan:
    image: kiran0099/lb-image
    ports:
      - "84:80"
    deploy:
      replicas: 3
    volumes:
      - /var/lib/loan
